name: PowerShell Lint
on:
  pull_request:
    branches: [dev, master]
    paths:
      - "**/*.ps1"
jobs:
  psscriptanalyzer:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $excludeRules = @(
            'PSAvoidUsingWriteHost',
            'PSUseBOMForUnicodeEncodedFile',
            'PSAvoidUsingPlainTextForPassword',
            'PSAvoidOverwritingBuiltInCmdlets',
            'PSAvoidGlobalVars',
            'PSReviewUnusedParameter',
            'PSUseShouldProcessForStateChangingFunctions',
            'PSUseSingularNouns',
            'PSUsePSCredentialType',
            'PSAvoidUsingInvokeExpression',
            'PSUseApprovedVerbs',
            'PSAvoidUsingUsernameAndPasswordParams',
            'PSUseUsingScopeModifierInNewRunspaces',
            'PSAvoidUsingWMICmdlet'
          )
          $files = Get-ChildItem -Recurse -Filter *.ps1 |
            Where-Object { $_.FullName -notlike '*/templates/*' }
          $results = $files | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_.FullName -Severity Warning, Error `
              -ExcludeRule $excludeRules
          }
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Host "❌ PSScriptAnalyzer found $($results.Count) issue(s)." `
              -ForegroundColor Red
            exit 1
          }
          Write-Host "✅ PSScriptAnalyzer passed — no warnings or errors." `
            -ForegroundColor Green
      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $parseErrors = $null
          $syntaxErrors = @()
          Get-ChildItem -Recurse -Filter *.ps1 |
            Where-Object { $_.FullName -notlike '*/templates/*' } |
            ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              if (-not [string]::IsNullOrEmpty($content)) {
                $null = [System.Management.Automation.PSParser]::Tokenize(
                  $content, [ref]$parseErrors
                )
                if ($parseErrors) {
                  $syntaxErrors += "$($_.Name): $($parseErrors[0].Message)"
                }
              }
            }
          if ($syntaxErrors) {
            $syntaxErrors | ForEach-Object { Write-Host "❌ $_" -ForegroundColor Red }
            exit 1
          }
          Write-Host "✅ Syntax check passed for all .ps1 files." `
            -ForegroundColor Green
